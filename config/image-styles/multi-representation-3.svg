<title>Tres representaciones de la aspirina: grafo molecular, SMILES y geometría 3D</title><desc>La misma molécula de ácido acetilsalicílico mostrada como grafo de átomos y enlaces, como cadena de caracteres SMILES y como conjunto de átomos en coordenadas tridimensionales.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th" x="40" y="32" fill="#1c1c1c">grafo molecular</text>
<text class="ts" x="40" y="50" fill="#5f5e5a">átomos = nodos, enlaces = aristas</text>
<g class="c-teal"><rect x="40" y="60" width="190" height="280" rx="8"/></g>

