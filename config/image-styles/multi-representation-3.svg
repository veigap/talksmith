<text class="th mono" x="355" y="204" text-anchor="middle" fill="#3C3489">c1ccccc1</text>
<text class="th mono" x="355" y="228" text-anchor="middle" fill="#3C3489">C(=O)O</text>
<text class="ts" x="355" y="278" text-anchor="middle" fill="#534AB7">linealiza el grafo</text>
<text class="ts" x="355" y="294" text-anchor="middle" fill="#534AB7">como texto procesable</text>
<text class="ts" x="355" y="310" text-anchor="middle" fill="#534AB7">por un LLM</text>

