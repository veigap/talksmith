<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 320" role="img">
<style>
text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
.t { font-size: 14px; fill: #1c1c1c; }
.ts { font-size: 12px; fill: #5f5e5a; }
.th { font-size: 14px; font-weight: 500; fill: #1c1c1c; }
.c-blue > rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
.c-teal > rect { fill: #E1F5EE; stroke: #1D9E75; stroke-width: 0.5; }
</style>
<title>Misma señal vista en el dominio del tiempo y en el dominio de la frecuencia</title><desc>A la izquierda la suma de dos sinusoides en función del tiempo. A la derecha su espectro, donde se ven dos picos correspondientes a las dos frecuencias presentes en la señal.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th" x="40" y="32" fill="#1c1c1c">dominio del tiempo</text>
<text class="ts" x="40" y="50" fill="#5f5e5a">¿qué valor tiene en cada instante?</text>
<g class="c-blue"><rect x="40" y="60" width="290" height="200" rx="8"/></g>
<line x1="55" y1="160" x2="315" y2="160" stroke="#85B7EB" stroke-width="0.5"/>
<polyline fill="none" stroke="#0C447C" stroke-width="1.6" points="55,160 60,148 65,135 70,123 75,114 80,108 85,108 90,112 95,121 100,134 105,150 110,170 115,190 120,206 125,217 130,222 135,221 140,213 145,200 150,184 155,168 160,154 165,144 170,138 175,138 180,143 185,153 190,167 195,184 200,201 205,217 210,229 215,234 220,232 225,224 230,209 235,191 240,172 245,153 250,138 255,127 260,121 265,121 270,127 275,138 280,153 285,170 290,187 295,202 300,213 305,219 310,219 315,213"/>
<text class="ts" x="60" y="252" fill="#185FA5">tiempo →</text>

<text class="th" x="350" y="32" fill="#1c1c1c">dominio de la frecuencia</text>
<text class="ts" x="350" y="50" fill="#5f5e5a">¿de qué oscilaciones está hecha?</text>
<g class="c-teal"><rect x="350" y="60" width="290" height="200" rx="8"/></g>
<line x1="365" y1="225" x2="625" y2="225" stroke="#5DCAA5" stroke-width="0.5"/>
<line x1="370" y1="225" x2="370" y2="100" stroke="#5DCAA5" stroke-width="0.5"/>
<line x1="430" y1="225" x2="430" y2="100" stroke="#0F6E56" stroke-width="3"/>
<line x1="540" y1="225" x2="540" y2="140" stroke="#0F6E56" stroke-width="3"/>
<text class="ts" x="430" y="92" text-anchor="middle" fill="#085041">f₁</text>
<text class="ts" x="540" y="92" text-anchor="middle" fill="#085041">f₂</text>
<text class="ts" x="360" y="252" fill="#0F6E56">frecuencia →</text>

<text class="ts" x="340" y="298" text-anchor="middle" fill="#888780">misma información — dos representaciones equivalentes</text>
</svg>
