<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 340" role="img">
<style>
text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
.t { font-size: 14px; fill: #1c1c1c; }
.ts { font-size: 12px; fill: #5f5e5a; }
.th { font-size: 14px; font-weight: 500; fill: #1c1c1c; }
.c-purple > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
.c-coral > rect { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
</style>
<title>Modelo McSharry: oscilador en órbita y ECG sintético resultante</title><desc>A la izquierda, la trayectoria circular del oscilador con cinco atractores angulares P, Q, R, S, T. A la derecha, el latido de ECG sintético que se obtiene al perturbar la dinámica con esos atractores.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th" x="40" y="30" fill="#1c1c1c">oscilador en órbita</text>
<text class="ts" x="40" y="48" fill="#5f5e5a">5 atractores angulares — uno por onda</text>
<g class="c-purple"><rect x="40" y="60" width="280" height="260" rx="8"/></g>

<circle cx="180" cy="190" r="90" fill="none" stroke="#7F77DD" stroke-width="0.8" stroke-dasharray="3 3"/>
<line x1="80" y1="190" x2="280" y2="190" stroke="#AFA9EC" stroke-width="0.5"/>
<line x1="180" y1="90" x2="180" y2="290" stroke="#AFA9EC" stroke-width="0.5"/>
<text class="ts" x="287" y="194" fill="#534AB7">x</text>
<text class="ts" x="183" y="86" fill="#534AB7">y</text>

<path d="M 180 190 m 90 0 a 90 90 0 0 1 -90 90" fill="none" stroke="#3C3489" stroke-width="2" marker-end="url(#arrow)"/>

<circle cx="247" cy="226" r="5" fill="#3C3489"/>
<text class="th" x="260" y="240" fill="#3C3489">P</text>
<circle cx="180" cy="100" r="5" fill="#3C3489"/>
<text class="th" x="173" y="92" fill="#3C3489">Q</text>
<circle cx="172" cy="100.4" r="6" fill="#D85A30"/>
<text class="th" x="155" y="92" fill="#993C1D">R</text>
<circle cx="195" cy="103" r="5" fill="#3C3489"/>
<text class="th" x="205" y="98" fill="#3C3489">S</text>
<circle cx="116" cy="220" r="5" fill="#3C3489"/>
<text class="th" x="92" y="225" fill="#3C3489">T</text>

<text class="ts" x="180" y="194" text-anchor="middle" fill="#534AB7">θ</text>
<text class="ts" x="180" y="312" text-anchor="middle" fill="#888780">ángulo θ ≈ tiempo en el ciclo cardíaco</text>

<line x1="335" y1="190" x2="395" y2="190" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="365" y="184" text-anchor="middle" fill="#888780">z</text>

<text class="th" x="410" y="30" fill="#1c1c1c">ECG sintético resultante</text>
<text class="ts" x="410" y="48" fill="#5f5e5a">coordenada z(t) del oscilador</text>
<g class="c-coral"><rect x="410" y="60" width="230" height="260" rx="8"/></g>
<line x1="420" y1="220" x2="630" y2="220" stroke="#F0997B" stroke-width="0.5"/>
<polyline fill="none" stroke="#993C1D" stroke-width="1.8" points="420,220 432,220 438,214 444,209 450,213 456,219 460,220 470,220 482,220 488,220 494,217 500,220 506,222 510,180 514,120 518,260 524,232 530,222 540,220 552,220 558,220 565,210 575,202 585,205 595,213 605,218 615,220 630,220"/>

<text class="ts" x="445" y="306" fill="#993C1D">P</text>
<text class="ts" x="500" y="306" fill="#993C1D">Q</text>
<text class="ts" x="514" y="306" fill="#A32D2D">R</text>
<text class="ts" x="525" y="306" fill="#993C1D">S</text>
<text class="ts" x="575" y="306" fill="#993C1D">T</text>
<line x1="445" y1="290" x2="445" y2="212" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="2 2"/>
<line x1="500" y1="290" x2="500" y2="218" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="2 2"/>
<line x1="514" y1="290" x2="514" y2="125" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="2 2"/>
<line x1="525" y1="290" x2="525" y2="232" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="2 2"/>
<line x1="575" y1="290" x2="575" y2="205" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="2 2"/>
</svg>
