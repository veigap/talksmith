<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 420" role="img">
<style>
text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
.t { font-size: 14px; fill: #1c1c1c; }
.ts { font-size: 12px; fill: #5f5e5a; }
.th { font-size: 14px; font-weight: 500; fill: #1c1c1c; }
</style>
<title>Aliasing: una rueda parece girar al revés cuando se muestrea demasiado lento</title><desc>Arriba la rueda muestreada a buena frecuencia: el rayo rojo avanza en sentido horario. Abajo la misma rueda muestreada más lentamente: el rayo parece retroceder, aunque en realidad sigue girando hacia adelante.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th" x="40" y="32" fill="#1c1c1c">muestreo correcto — rueda gira hacia adelante</text>
<text class="ts" x="40" y="48" fill="#5f5e5a">fₛ &gt; 2·f_rotación → reconstrucción fiel</text>

<g transform="translate(80,130)"><circle cx="0" cy="0" r="45" fill="none" stroke="#5f5e5a" stroke-width="1"/><line x1="0" y1="0" x2="40" y2="0" stroke="#D85A30" stroke-width="2.5"/><circle cx="0" cy="0" r="3" fill="#5f5e5a"/><text class="ts" x="0" y="68" text-anchor="middle" fill="#888780">t₀</text></g>
<g transform="translate(195,130)"><circle cx="0" cy="0" r="45" fill="none" stroke="#5f5e5a" stroke-width="1"/><line x1="0" y1="0" x2="28" y2="28" stroke="#D85A30" stroke-width="2.5"/><circle cx="0" cy="0" r="3" fill="#5f5e5a"/><text class="ts" x="0" y="68" text-anchor="middle" fill="#888780">t₁</text></g>
<g transform="translate(310,130)"><circle cx="0" cy="0" r="45" fill="none" stroke="#5f5e5a" stroke-width="1"/><line x1="0" y1="0" x2="0" y2="40" stroke="#D85A30" stroke-width="2.5"/><circle cx="0" cy="0" r="3" fill="#5f5e5a"/><text class="ts" x="0" y="68" text-anchor="middle" fill="#888780">t₂</text></g>
<g transform="translate(425,130)"><circle cx="0" cy="0" r="45" fill="none" stroke="#5f5e5a" stroke-width="1"/><line x1="0" y1="0" x2="-28" y2="28" stroke="#D85A30" stroke-width="2.5"/><circle cx="0" cy="0" r="3" fill="#5f5e5a"/><text class="ts" x="0" y="68" text-anchor="middle" fill="#888780">t₃</text></g>
<g transform="translate(540,130)"><circle cx="0" cy="0" r="45" fill="none" stroke="#5f5e5a" stroke-width="1"/><line x1="0" y1="0" x2="-40" y2="0" stroke="#D85A30" stroke-width="2.5"/><circle cx="0" cy="0" r="3" fill="#5f5e5a"/><text class="ts" x="0" y="68" text-anchor="middle" fill="#888780">t₄</text></g>

<path d="M 130 105 Q 170 90 195 105" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>
<path d="M 245 105 Q 285 90 310 105" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>
<path d="M 360 105 Q 400 90 425 105" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>
<path d="M 475 105 Q 515 90 540 105" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>

<text class="th" x="40" y="232" fill="#1c1c1c">muestreo muy lento — la rueda parece girar al revés</text>
<text class="ts" x="40" y="248" fill="#5f5e5a">fₛ &lt; 2·f_rotación → aliasing, contenido alto se "dobla" a baja frecuencia</text>

<g transform="translate(80,330)"><circle cx="0" cy="0" r="45" fill="none" stroke="#5f5e5a" stroke-width="1"/><line x1="0" y1="0" x2="40" y2="0" stroke="#A32D2D" stroke-width="2.5"/><circle cx="0" cy="0" r="3" fill="#5f5e5a"/><text class="ts" x="0" y="68" text-anchor="middle" fill="#888780">t₀</text></g>
<g transform="translate(195,330)"><circle cx="0" cy="0" r="45" fill="none" stroke="#5f5e5a" stroke-width="1"/><line x1="0" y1="0" x2="28" y2="-28" stroke="#A32D2D" stroke-width="2.5"/><circle cx="0" cy="0" r="3" fill="#5f5e5a"/><text class="ts" x="0" y="68" text-anchor="middle" fill="#888780">t₁</text></g>
<g transform="translate(310,330)"><circle cx="0" cy="0" r="45" fill="none" stroke="#5f5e5a" stroke-width="1"/><line x1="0" y1="0" x2="0" y2="-40" stroke="#A32D2D" stroke-width="2.5"/><circle cx="0" cy="0" r="3" fill="#5f5e5a"/><text class="ts" x="0" y="68" text-anchor="middle" fill="#888780">t₂</text></g>
<g transform="translate(425,330)"><circle cx="0" cy="0" r="45" fill="none" stroke="#5f5e5a" stroke-width="1"/><line x1="0" y1="0" x2="-28" y2="-28" stroke="#A32D2D" stroke-width="2.5"/><circle cx="0" cy="0" r="3" fill="#5f5e5a"/><text class="ts" x="0" y="68" text-anchor="middle" fill="#888780">t₃</text></g>
<g transform="translate(540,330)"><circle cx="0" cy="0" r="45" fill="none" stroke="#5f5e5a" stroke-width="1"/><line x1="0" y1="0" x2="-40" y2="0" stroke="#A32D2D" stroke-width="2.5"/><circle cx="0" cy="0" r="3" fill="#5f5e5a"/><text class="ts" x="0" y="68" text-anchor="middle" fill="#888780">t₄</text></g>

<path d="M 130 305 Q 170 320 195 305" fill="none" stroke="#A32D2D" stroke-width="1.2" marker-end="url(#arrow)"/>
<path d="M 245 305 Q 285 320 310 305" fill="none" stroke="#A32D2D" stroke-width="1.2" marker-end="url(#arrow)"/>
<path d="M 360 305 Q 400 320 425 305" fill="none" stroke="#A32D2D" stroke-width="1.2" marker-end="url(#arrow)"/>
<path d="M 475 305 Q 515 320 540 305" fill="none" stroke="#A32D2D" stroke-width="1.2" marker-end="url(#arrow)"/>
</svg>
