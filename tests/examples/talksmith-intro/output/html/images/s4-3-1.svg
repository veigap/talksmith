<svg xmlns="http://www.w3.org/2000/svg" width="760" height="560" viewBox="0 0 760 560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="760" height="560" fill="#ffffff"/>

  <!-- step boxes (centered column) -->
  <!-- edit -->
  <rect x="230" y="24" width="300" height="52" rx="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="380" y="56" text-anchor="middle" font-size="15" fill="#334155">you edit <tspan font-family="monospace" fill="#475569">draft.md</tspan></text>

  <!-- raw bullet -->
  <rect x="210" y="108" width="340" height="56" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="380" y="132" text-anchor="middle" font-size="14" font-family="monospace" fill="#475569">- "trim this slide"</text>
  <text x="380" y="152" text-anchor="middle" font-size="12" fill="#94a3b8">raw bullet</text>

  <!-- open -->
  <rect x="196" y="196" width="368" height="56" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="380" y="220" text-anchor="middle" font-size="14" font-family="monospace" fill="#1d4ed8">[open] 2026-07-14 — "…"</text>
  <text x="380" y="240" text-anchor="middle" font-size="12" fill="#94a3b8">stamped + dated, then applied</text>

  <!-- closed -->
  <rect x="176" y="284" width="408" height="64" rx="12" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="380" y="308" text-anchor="middle" font-size="14" font-family="monospace" fill="#047857">[closed] 2026-07-14 — "…"</text>
  <text x="380" y="330" text-anchor="middle" font-size="13" fill="#475569">Resolution: what changed &amp; why</text>

  <!-- backlog -->
  <rect x="196" y="380" width="368" height="56" rx="12" fill="#fdeaec" stroke="#DA1B2E" stroke-width="2"/>
  <text x="380" y="404" text-anchor="middle" font-size="14" font-family="monospace" fill="#DA1B2E">feedback-backlog.md</text>
  <text x="380" y="424" text-anchor="middle" font-size="12" fill="#94a3b8">audit trail — never deleted</text>

  <!-- vertical arrows -->
  <g stroke="#94a3b8" stroke-width="2.5" marker-end="url(#a)">
    <line x1="380" y1="76" x2="380" y2="106"/>
    <line x1="380" y1="164" x2="380" y2="194"/>
    <line x1="380" y1="252" x2="380" y2="282"/>
    <line x1="380" y1="348" x2="380" y2="378"/>
  </g>

  <!-- loop-back arrow: from backlog up to edit, on the right -->
  <path d="M 564 408 H 660 V 50 H 532" fill="none" stroke="#059669" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="672" y="230" font-size="13" font-weight="600" fill="#059669" transform="rotate(90 672 230)">loop until "final"</text>
</svg>
