<title>Whole-slide image: imagen completa de biopsia vs crop al detalle</title><desc>A la izquierda una whole-slide image de una biopsia patológica completa, con una pequeña región resaltada. A la derecha esa región ampliada a nivel celular, ilustrando el desafío de escala gigapíxel.</desc>
