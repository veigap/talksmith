<text class="ts" x="115" y="55" fill="#712B13" text-anchor="middle">P</text>
<line x1="175" y1="122" x2="175" y2="60" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="2 2"/>
<text class="ts" x="175" y="55" fill="#712B13" text-anchor="middle">Q</text>
<line x1="182" y1="72" x2="182" y2="60" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="2 2"/>
<text class="ts" x="195" y="55" fill="#712B13" text-anchor="middle">R</text>
<line x1="189" y1="150" x2="189" y2="170" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="2 2"/>
<text class="ts" x="205" y="180" fill="#712B13" text-anchor="middle">S</text>
<line x1="250" y1="104" x2="250" y2="60" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="2 2"/>
<text class="ts" x="250" y="55" fill="#712B13" text-anchor="middle">T</text>

