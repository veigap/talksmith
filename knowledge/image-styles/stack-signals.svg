<title>Señales biomédicas típicas: ECG con ondas P-QRS-T, EEG multicanal y PPG</title><desc>Strip de ECG con anotaciones de las ondas P, Q, R, S y T, debajo un EEG de cuatro canales en paralelo y por último una señal de fotopletismografía típica de un smartwatch.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th" x="40" y="32" fill="#1c1c1c">ECG con anotaciones P-QRS-T</text>
<g class="c-coral"><rect x="40" y="44" width="600" height="140" rx="8"/></g>
<line x1="55" y1="120" x2="625" y2="120" stroke="#F0997B" stroke-width="0.5"/>
<polyline fill="none" stroke="#993C1D" stroke-width="1.6" points="55,120 100,120 115,108 130,120 155,120 175,122 182,72 189,150 196,120 230,120 250,104 275,120 310,120 350,120 365,108 380,120 405,120 425,122 432,72 439,150 446,120 480,120 500,104 525,120 560,120 600,120 615,108 625,118"/>
