.c-teal > rect { fill: #E1F5EE; stroke: #1D9E75; stroke-width: 0.5; }
</style>
<title>Aproximación de una onda cuadrada como suma de senos</title><desc>Tres paneles muestran progresivamente cómo agregar más armónicos a una serie de Fourier hace que la suma se acerque cada vez más a una onda cuadrada.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th" x="140" y="30" text-anchor="middle" fill="#1c1c1c">1 armónico</text>
<text class="ts" x="140" y="48" text-anchor="middle" fill="#5f5e5a">sólo el seno fundamental</text>
<g class="c-gray"><rect x="40" y="60" width="200" height="170" rx="8"/></g>
<line x1="50" y1="130" x2="230" y2="130" stroke="#B4B2A9" stroke-width="0.5"/>
<polyline fill="none" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3" points="50,90 110,90 110,170 170,170 170,90 230,90"/>
<polyline fill="none" stroke="#2C2C2A" stroke-width="1.8" points="50,130.0 57,111.7 64,95.9 71,84.6 78,79.3 85,80.8 92,88.8 99,102.3 106,119.4 113,138.0 120,155.5 127,169.6 134,178.4 141,180.9 148,176.5 155,166.0 162,150.7 169,132.7 176,114.3 183,97.9 190,85.9 197,79.7 204,80.2 211,87.3 218,100.1 225,116.8 230,128.5"/>

<text class="th" x="340" y="30" text-anchor="middle" fill="#1c1c1c">3 armónicos</text>
<text class="ts" x="340" y="48" text-anchor="middle" fill="#5f5e5a">fundamental + 3.º + 5.º</text>
<g class="c-purple"><rect x="240" y="60" width="200" height="170" rx="8"/></g>
<line x1="250" y1="130" x2="430" y2="130" stroke="#AFA9EC" stroke-width="0.5"/>
<polyline fill="none" stroke="#7F77DD" stroke-width="0.6" stroke-dasharray="3 3" points="250,90 310,90 310,170 370,170 370,90 430,90"/>
<polyline fill="none" stroke="#3C3489" stroke-width="1.8" points="250,130.0 257,86.8 264,87.3 271,94.5 278,86.7 285,90.2 292,93.7 299,82.9 306,100.6 313,152.9 320,177.5 327,167.4 334,168.5 341,173.9 348,166.2 355,170.8 362,175.7 369,138.0 376,90.3 383,85.5 390,94.7 397,87.6 404,88.8 411,94.5 418,83.9 425,95.0 430,100"/>

<text class="th" x="540" y="30" text-anchor="middle" fill="#1c1c1c">15 armónicos</text>
<text class="ts" x="540" y="48" text-anchor="middle" fill="#5f5e5a">casi onda cuadrada</text>
<g class="c-teal"><rect x="440" y="60" width="200" height="170" rx="8"/></g>
<line x1="450" y1="130" x2="630" y2="130" stroke="#5DCAA5" stroke-width="0.5"/>
<polyline fill="none" stroke="#1D9E75" stroke-width="0.6" stroke-dasharray="3 3" points="450,90 510,90 510,170 570,170 570,90 630,90"/>
<polyline fill="none" stroke="#085041" stroke-width="1.8" points="450,130.0 457,89.8 464,88.7 471,90.0 478,90.9 485,90.0 492,89.0 499,89.9 506,93.9 513,171.0 520,171.7 527,170.0 534,169.1 541,170.0 548,170.9 555,170.0 562,167.9 569,164.9 576,87.3 583,90.1 590,91.0 597,90.0 604,89.1 611,90.0 618,91.4 625,90.4"/>

<line x1="245" y1="244" x2="430" y2="244" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="445" y1="244" x2="630" y2="244" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="160" y="248" fill="#888780">más armónicos →</text>
